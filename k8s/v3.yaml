apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disease-v3
  template:
    metadata:
      labels:
        app: disease-v3
    spec:
      containers:
      - name: disease
        image: santhoshh005/disease:v3
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: disease-v3-service
spec:
  selector:
    app: disease-v3
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort