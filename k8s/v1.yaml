apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disease-v1
  template:
    metadata:
      labels:
        app: disease-v1
    spec:
      containers:
      - name: disease
        image: santhoshh005/disease:v1
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: disease-v1-service
spec:
  selector:
    app: disease-v1
  ports:
    - port: 80
      targetPort: 3000
  type: NodePort