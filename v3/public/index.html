<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Records v3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🏥 Patient Records System v3</h1>
      <p>Full-Stack Enterprise Solution</p>
    </header>

    <nav class="navbar">
      <button class="nav-btn active" onclick="navigateTo('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="navigateTo('patients')">Patients</button>
      <button class="nav-btn" onclick="navigateTo('appointments')">Appointments</button>
      <button class="nav-btn" onclick="navigateTo('prescriptions')">Prescriptions</button>
    </nav>

    <div id="dashboard" class="page active">
      <h2>Dashboard</h2>
      <div class="stats">
        <div class="stat-card">
          <h3 id="patientCount">0</h3>
          <p>Total Patients</p>
        </div>
        <div class="stat-card">
          <h3 id="appointmentCount">0</h3>
          <p>Appointments</p>
        </div>
        <div class="stat-card">
          <h3 id="prescriptionCount">0</h3>
          <p>Prescriptions</p>
        </div>
      </div>
    </div>

    <div id="patients" class="page">
      <h2>Patient Management</h2>
      <div class="form-section">
        <form id="patientForm">
          <input type="text" id="name" placeholder="Full Name" required>
          <input type="email" id="email" placeholder="Email" required>
          <input type="tel" id="phone" placeholder="Phone" required>
          <input type="date" id="dob" placeholder="Date of Birth">
          <textarea id="address" placeholder="Address" rows="3"></textarea>
          <button type="submit">Add Patient</button>
        </form>
        <div id="patientMsg" class="message"></div>
      </div>
      <div id="patientsList"></div>
    </div>

    <div id="appointments" class="page">
      <h2>Appointments</h2>
      <form id="appointmentForm">
        <input type="text" id="appointmentPatient" placeholder="Patient ID" required>
        <input type="datetime-local" id="appointmentDate" required>
        <input type="text" id="appointmentReason" placeholder="Reason" required>
        <button type="submit">Schedule Appointment</button>
      </form>
      <div id="appointmentsList"></div>
    </div>

    <div id="prescriptions" class="page">
      <h2>Prescriptions</h2>
      <form id="prescriptionForm">
        <input type="text" id="prescriptionPatient" placeholder="Patient ID" required>
        <input type="text" id="prescriptionMedicine" placeholder="Medicine" required>
        <input type="text" id="prescriptionDosage" placeholder="Dosage" required>
        <button type="submit">Add Prescription</button>
      </form>
      <div id="prescriptionsList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
