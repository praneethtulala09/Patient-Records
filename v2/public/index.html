<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Records v2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Patient Records System v2</h1>
      <p>Add, Search, and Update Records</p>
    </header>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('add')">Add Patient</button>
      <button class="tab-btn" onclick="showTab('search')">Search</button>
      <button class="tab-btn" onclick="showTab('all')">View All</button>
    </div>

    <div id="add" class="tab-content active">
      <h2>Add New Patient</h2>
      <form id="addForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone" required>
        <input type="date" id="dob" placeholder="Date of Birth">
        <textarea id="address" placeholder="Address" rows="3"></textarea>
        <button type="submit">Add Patient</button>
      </form>
      <div id="addMsg" class="message"></div>
    </div>

    <div id="search" class="tab-content">
      <h2>Search Patients</h2>
      <div class="search-box">
        <input type="text" id="searchBox" placeholder="Search by name or email...">
        <button onclick="searchPatients()">Search</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <div id="all" class="tab-content">
      <h2>All Patients</h2>
      <button onclick="loadAllPatients()">Load All</button>
      <div id="allPatients"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
